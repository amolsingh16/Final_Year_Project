{% extends "base.html" %}

{% block content %}

<div class="container" style="max-width:600px; margin:auto; margin-top:50px;">

<div style="background:white; padding:30px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.2); text-align:center;">

<h2 style="color:#2e7d32;">🌿 Plant Disease Detection</h2>

<p style="color:gray;">Upload a leaf image to detect plant disease using AI.</p>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<input type="file" name="image" required onchange="previewImage(event)" style="margin-top:10px;">

<br><br>

<img id="preview" style="display:none; max-width:100%; border-radius:10px; margin-bottom:15px;">

<br>

<button type="submit" style="background:#2e7d32; color:white; padding:10px 25px; border:none; border-radius:6px; cursor:pointer;">
🔍 Detect Disease
</button>

</form>

{% if result %}

<div style="margin-top:25px; padding:15px; background:#e8f5e9; border-radius:8px;">

<h3>🦠 Disease Detected</h3>

<p style="font-size:20px; color:#2e7d32; font-weight:bold;">
{{ result }}
</p>

</div>

{% endif %}

{% if error %}

<p style="color:red; margin-top:15px;">{{ error }}</p>

{% endif %}

</div>

</div>

<script>

function previewImage(event){

var reader = new FileReader();

reader.onload = function(){

var img = document.getElementById("preview");
img.src = reader.result;
img.style.display = "block";

}

reader.readAsDataURL(event.target.files[0]);

}

</script>

{% endblock %}
